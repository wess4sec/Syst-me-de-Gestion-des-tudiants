<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Liste des Bulletins — SGE</title>
    <style>
        body{font-family:Arial,sans-serif;margin:0;background:#f4f6f9;}
        .container{max-width:1100px;margin:30px auto;padding:0 20px;}
        h1{color:#1e3a5f;}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;
              overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);}
        th{background:#1e3a5f;color:#fff;padding:12px 14px;text-align:left;}
        td{padding:11px 14px;border-bottom:1px solid #e0e0e0;}
        tr.admis td{background:#e8f5e9;}
        tr.ajourne td{background:#ffebee;}
        tr:hover td{filter:brightness(.97);}
        .ok{color:#2e7d32;font-weight:bold;}
        .ko{color:#c62828;font-weight:bold;}
        .btn{display:inline-block;padding:5px 12px;border-radius:4px;
             text-decoration:none;font-size:.85rem;background:#1e3a5f;color:#fff;}
        .add-btn{margin-bottom:16px;display:inline-block;padding:8px 18px;
                 background:#2e7d32;color:#fff;border-radius:5px;text-decoration:none;}
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container">
    <h1>📋 Liste des Bulletins — Année 2025/2026</h1>

    <a sec:authorize="hasRole('ADMIN')" th:href="@{/notes}" class="add-btn">➕ Gérer les notes</a>

    <table>
        <thead>
            <tr>
                <th>Nom</th><th>Prénom</th><th>Groupe</th><th>Filière</th>
                <th>Moyenne</th><th>Mention</th><th>Statut</th><th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="b : ${bulletins}" th:class="${b.admis} ? 'admis' : 'ajourne'">
                <td th:text="${b.etudiant.nom}"></td>
                <td th:text="${b.etudiant.prenom}"></td>
                <td th:text="${b.etudiant.groupe}"></td>
                <td th:text="${b.etudiant.filiere != null} ? ${b.etudiant.filiere.nom} : '—'"></td>
                <td th:text="${#numbers.formatDecimal(b.moyenneGenerale,1,2)}"></td>
                <td th:text="${b.mention}"></td>
                <td>
                    <span th:if="${b.admis}" class="ok">✔ Admis</span>
                    <span th:unless="${b.admis}" class="ko">✘ Ajourné</span>
                </td>
                <td>
                    <a th:href="@{/bulletins/{id}(id=${b.etudiant.id})}" class="btn">Voir bulletin</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(bulletins)}">
                <td colspan="8" style="text-align:center;color:#999;padding:20px;">
                    Aucun étudiant enregistré.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
